name: Run 365.py for all txt files (loop)

on:
  workflow_dispatch:
  repository_dispatch:
    types: [loop]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  actions: write

concurrency:
  group: action-loop
  cancel-in-progress: true

jobs:
  prepare-input:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Unzip input zip
        run: |
          mkdir -p input
          mkdir -p input_temp

          zip_file=$(ls *.zip | head -n 1)
          echo "ZIP: $zip_file"

          unzip -o "$zip_file" -d input_temp
          find input_temp -type f -name "*.txt" -exec mv {} input/ \;

          rm -rf input_temp
          ls -lh input

      - name: Upload input files
        continue-on-error: true
        uses: actions/upload-artifact@v4.3.0
        with:
          name: input-txt
          path: input/

  discover-files:
    needs: prepare-input
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}

    steps:
      - name: Download input artifact
        uses: actions/download-artifact@v4.2.0
        with:
          name: input-txt
          path: input/

      - name: Build matrix
        id: set
        run: |
          files=$(find input -type f -name "*.txt" | sort | jq -R -s -c 'split("\n")[:-1]')
          echo "matrix={\"file\":$files}" >> $GITHUB_OUTPUT

  run-script:
    needs: discover-files
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.discover-files.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v4

      - name: Download input artifact
        uses: actions/download-artifact@v4.2.0
        with:
          name: input-txt
          path: input/

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Run script
        run: |
          cp "${{ matrix.file }}" mail.txt
          python 365.py mail.txt || true

      - name: Package result
        run: |
          mkdir -p per_job_output

          timestamp=$(date +'%Y%m%d_%H%M%S')
          base=$(basename "${{ matrix.file }}" .txt)

          outfile="per_job_output/result_${base}_${timestamp}.txt"

          if [ -s success_results.txt ]; then
            cp success_results.txt "$outfile"
          else
            touch "$outfile"
          fi

          echo "OUTFILE=$outfile" >> $GITHUB_ENV
          echo "ARTIFACT_NAME=result-${base}-${timestamp}" >> $GITHUB_ENV

      - name: Upload result
        continue-on-error: true
        uses: actions/upload-artifact@v4.3.0
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ env.OUTFILE }}

  collect-results:
    if: always()
    needs: run-script
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all results
        continue-on-error: true
        uses: actions/download-artifact@v4.2.0
        with:
          path: all_results

      - name: Merge results
        run: |
          mkdir -p merged_results

          timestamp=$(date +'%Y%m%d_%H%M%S')
          merged_file="merged_results/success_results_${timestamp}.txt"

          find all_results -type f -name "*.txt" -size +0c \
            -exec cat {} + | sort -u > "$merged_file" || true

          echo "MERGED_FILE=$merged_file" >> $GITHUB_ENV

      - name: Commit results
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add merged_results/ || true
          git commit -m "update results" || true
          git push || true

      - name: Upload merged result
        uses: actions/upload-artifact@v4.3.0
        with:
          name: merged-results
          path: ${{ env.MERGED_FILE }}

      - name: Trigger next run
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Sleep before next run..."
          sleep 120

          url="https://api.github.com/repos/${GITHUB_REPOSITORY}/dispatches"

          for i in 1 2 3; do

            code=$(curl -s -o /dev/null -w "%{http_code}" \
              -X POST \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer $GH_TOKEN" \
              $url \
              -d '{"event_type":"loop"}')

            echo "Dispatch attempt $i HTTP=$code"

            if [ "$code" = "204" ]; then
              echo "Next run triggered."
              exit 0
            fi

            sleep 30

          done

          echo "Dispatch failed but workflow finished."
